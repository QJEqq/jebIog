{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock title %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }
        .animate-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950 min-h-screen">

    <!-- Анимированные фоны (параллакс) -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-20 left-20 w-96 h-96 bg-purple-500/20 rounded-full blur-3xl parallax-bg" data-speed="0.5" id="bg-1"></div>
        <div class="absolute bottom-20 right-20 w-96 h-96 bg-pink-500/20 rounded-full blur-3xl parallax-bg" data-speed="-0.3" id="bg-2"></div>
        <div class="absolute top-1/3 right-20 w-20 h-20 bg-pink-400/30 rounded-full blur-2xl floating-element"></div>
        <div class="absolute top-2/3 left-40 w-32 h-32 bg-purple-400/30 rounded-full blur-2xl floating-element-delayed"></div>
    </div>

    <!-- Хедер (фиксированный) -->
    <header id='main-header'class="fixed top-0 left-0 right-0 z-50 glass-header w-full">
        <nav class=" mx-auto px-8 py-4 grid grid-cols-3 items-center">
            <a href="{% url 'main:Home_Page'%}">
            <div class="flex items-center gap-3 justify-self-start">
                
                <div class='logo-circle'>
                    <img src="{% static 'img/logo.png' %}" alt="JEB Logo" class="h-12 w-12 object-contain invert">
                </div>
                <span class="text-2xl font-bold text-white tracking-tight">JEB</span>
                
            </div>
            </a>
            <!-- Навигация -->
            <div class="hidden md:flex items-center gap-8 justify-self-center">
                <a href="#services" class="nav-link">Сервисы</a>
                <a href="#projects" class="nav-link">Проекты</a>
                <a href="#contact" class="nav-link">Контакты</a>
            </div>
            
            
            <div class="justify-self-end">
                <button class="cta-button px-3 py-3 rounded-lg flex items-center">
                    <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>  
            
        </nav>
    </header>

    <main>
        {% block content%}{% endblock content %}
    </main>

    <!-- Footer -->
    <footer class="relative py-12 px-6 border-t border-white/10 z-10">
        <div class="container mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3">
                    <span class="text-xl font-bold text-white">JEB</span>
                </div>
                <p class="text-purple-300 text-center">
                    © 2024 JEB. All rights reserved. Digital ecosystem for your business.
                </p>
                <div class="flex gap-6">
                    <a href="#" class="text-purple-300 hover:text-pink-400 transition-colors duration-300">О нас</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Скрипт для анимаций -->
    <script src="{% static 'js/htmx.min.js' %}"></script> 
    <script src="{% static 'js/animation.js' %}"></script>

</body>
</html>
