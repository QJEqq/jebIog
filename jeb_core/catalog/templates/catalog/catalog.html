{% extends 'base.html' %}
{% load static %}

{% block title %}Каталог | JEB{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-10 pb-20">
    
    <div class="flex justify-center mb-12">
        <div class="bg-darkCard/80 backdrop-blur-md p-1.5 rounded-2xl flex gap-2 border border-white/5 shadow-2xl">
            <a href="?type=computers" 
               class="px-8 py-3 rounded-xl transition-all duration-300 font-bold uppercase tracking-widest text-xs flex items-center gap-2 
               {% if product_type == 'computers' %}bg-blue-600 text-white shadow-lg shadow-blue-600/20{% else %}text-gray-500 hover:text-white hover:bg-white/5{% endif %}">
                🖥️ Готовые ПК
            </a>
            
            <a href="?type=components" 
               class="px-8 py-3 rounded-xl transition-all duration-300 font-bold uppercase tracking-widest text-xs flex items-center gap-2 
               {% if product_type == 'components' %}bg-blue-600 text-white shadow-lg shadow-blue-600/20{% else %}text-gray-500 hover:text-white hover:bg-white/5{% endif %}">
                🔧 Комплектующие
            </a>
        </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
        
        <aside class="w-full lg:w-80 space-y-8">
            <div class="bg-darkCard/40 border border-white/5 rounded-[2rem] p-8 sticky top-24 backdrop-blur-sm">
                <h2 class="text-xl font-black text-white mb-8 uppercase  tracking-tighter">Фильтры</h2>
                
                <form hx-get="{% url 'catalog:catalog' %}" 
                      hx-target="#items-grid" 
                      hx-trigger="change, keyup delay:500ms"
                      hx-push-url="true"
                      class="space-y-8">
                    
                
                    <input type="hidden" name="type" value="{{ product_type }}">
                    
                    <div class="space-y-3">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Поиск по названию</label>
                        <input type="text" name="q" value="{{ search_query }}"
                               class="w-full bg-darkBg/50 border border-white/10 rounded-2xl px-5 py-3 text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder:text-gray-700"
                               placeholder="Например: RTX 4090...">
                    </div>
                    {% if product_type == 'components' %}
                    <div class="space-y-3">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Тип комплектующего</label>
                        <select name="typecom" class="w-full bg-darkBg/50 border border-white/10 rounded-2xl px-5 py-3 text-white focus:border-blue-500 outline-none transition-all cursor-pointer appearance-none">
                           
                            <option value="">Все разделы</option>
                            
                            {% for cat in componentType %}
                                <option class='bg-black' value="{{ cat.slug }}" {% if filter_params.typecom == cat.slug %}selected{% endif %}>
                                    {{ cat.name }}
                                </option>
                            {% endfor %}
                            
                        </select>
                    </div>
                    {% else %}
                    <div class="space-y-3">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Процессор</label>
                        <select name="cpu" class="w-full bg-darkBg/50 border border-white/10 rounded-2xl px-5 py-3 text-white focus:border-blue-500 outline-none transition-all cursor-pointer appearance-none">
                           
                            <option value="">Не выбрано</option>
                            
                            {% for cpu in cpus %}
                                <option class='bg-black' value="{{ cpu.id }}" {% if filter_params.cpu == cpu.id %}selected{% endif %}>
                                    {{ cpu.name }}
                                </option>
                            {% endfor %}
                            
                        </select>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Видеокарта</label>
                        <select name="gpu" class="w-full bg-darkBg/50 border border-white/10 rounded-2xl px-5 py-3 text-white focus:border-blue-500 outline-none transition-all cursor-pointer appearance-none">
                           
                            <option value="">Не выбрано</option>
                            
                            {% for gpu in gpus %}
                                <option class='bg-black' value="{{ gpu.id }}" {% if filter_params.gpu == gpu.id %}selected{% endif %}>
                                    {{ gpu.name }}
                                </option>
                            {% endfor %}
                            
                        </select>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Оперативная память</label>
                        <select name="ram" class="w-full bg-darkBg/50 border border-white/10 rounded-2xl px-5 py-3 text-white focus:border-blue-500 outline-none transition-all cursor-pointer appearance-none">
                           
                            <option value="">Не выбрано</option>
                            
                            {% for ram in rams %}
                                <option class='bg-black' value="{{ ram.id }}" {% if filter_params.ram == ram.id %}selected{% endif %}>
                                    {{ ram.name }}
                                </option>
                            {% endfor %}
                            
                        </select>
                    </div>
                    {% endif %}
                    <div class="space-y-3">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Бюджет (₽)</label>
                        <div class="flex items-center gap-3">
                            <input type="number" name="min_price" value="{{ filter_params.min_price }}" placeholder="От"
                                   class="w-full bg-darkBg/50 border border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-blue-500 transition-all">
                            <div class="h-px w-4 bg-white/10"></div>
                            <input type="number" name="max_price" value="{{ filter_params.max_price }}" placeholder="До"
                                   class="w-full bg-darkBg/50 border border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-blue-500 transition-all">
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="reset" onclick="window.location.href='{% url 'catalog:catalog' %}?type={{ product_type }}'" 
                                class="w-full py-4 rounded-2xl text-[10px] text-gray-500 hover:text-white hover:bg-white/5 border border-transparent hover:border-white/5 transition-all uppercase font-black tracking-widest">
                            Сбросить фильтры
                        </button>
                    </div>
                </form>
            </div>
        </aside>

        <main class="flex-1">
            <div id="items-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 transition-all duration-500">
                {% include 'catalog/partials/computer_list.html' %}
            </div>
        </main>

    </div>
</div>
{% endblock %}
