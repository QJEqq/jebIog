{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full p-8 backdrop-blur-xl bg-white/5 border border-white/10 rounded-2xl shadow-2xl shadow-blue-900/20">
        
        <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
            <div class="text-left">
                <p class="text-xs text-slate-400 uppercase tracking-widest">Номер телефона</p>
                <p class="text-white font-bold">{{ request.user.phone_number }}</p>
            </div>
            <a href="{% url 'users:logout' %}?next={% url 'users:register' %}" class="text-xs font-semibold text-blue-400 hover:text-blue-300 transition flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                Изменить
            </a>
        </div>

        <h2 class="text-2xl font-extrabold text-white mb-2 drop-shadow-blue text-center">Код подтверждения</h2>
        <p class="text-blue-200 text-sm mb-8 text-center">Введите 4 цифры из уведомления</p>

        <form method="POST" id="otp-form" class="space-y-8">
    {% csrf_token %}
    
    <div class="flex justify-between gap-3" id="otp-inputs">
        <input type="text" maxlength="1" class="otp-field w-16 h-20 bg-slate-900/60 border border-white/10 rounded-xl text-center text-3xl font-bold text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition duration-200" autofocus>
        <input type="text" maxlength="1" class="otp-field w-16 h-20 bg-slate-900/60 border border-white/10 rounded-xl text-center text-3xl font-bold text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition duration-200">
        <input type="text" maxlength="1" class="otp-field w-16 h-20 bg-slate-900/60 border border-white/10 rounded-xl text-center text-3xl font-bold text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition duration-200">
        <input type="text" maxlength="1" class="otp-field w-16 h-20 bg-slate-900/60 border border-white/10 rounded-xl text-center text-3xl font-bold text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition duration-200">
        
        <input type="hidden" name="code" id="full-code">
    </div>

    <button type="submit" class="w-full py-4 px-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg shadow-blue-700/40 transition duration-200 uppercase tracking-widest text-sm">
        Подтвердить
    </button>
</form>
<div class="flex justify-center items-center mt-8">
            <a href="{% url 'users:resend_sms' %}" 
               class="text-sm text-blue-400 hover:text-blue-300 transition font-medium">
                Отправить код повторно
            </a>
        </div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const inputs = document.querySelectorAll('.otp-field');
    const hiddenInput = document.getElementById('full-code');

    inputs.forEach((input, index) => {
        // Обработка ввода цифры
        input.addEventListener('input', (e) => {
            if (e.target.value.length > 0 && index < inputs.length - 1) {
                inputs[index + 1].focus(); // Переход вперед
            }
            updateCode();
        });

        // Обработка нажатия Backspace
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                inputs[index - 1].focus(); // Переход назад
            }
        });
    });

    function updateCode() {
        let code = '';
        inputs.forEach(input => code += input.value);
        hiddenInput.value = code; // Записываем в скрытое поле для Django
        console.log("Текущий код:", code); // Открой консоль браузера (F12), чтобы видеть сборку
    }
});
</script>
{% endblock %}
